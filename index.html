<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BeautyVerse AI - تحليل حقيقي بالذكاء الاصطناعي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #764ba2 100%);
            min-height: 100vh;
        }
        .container { max-width: 600px; margin: 0 auto; padding: 2rem; }
        .card { background: white; border-radius: 28px; padding: 2rem; margin-top: 3rem; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .logo { font-size: 2rem; font-weight: bold; background: linear-gradient(45deg, #ff6b6b, #4ecdc4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; }
        .btn { padding: 1rem 2rem; border: none; border-radius: 50px; font-size: 1.1rem; font-weight: 600; cursor: pointer; margin: 0.5rem; transition: transform 0.2s; }
        .btn-primary { background: linear-gradient(45deg, #ff6b6b, #feca57); color: white; box-shadow: 0 5px 15px rgba(255,107,107,0.3); }
        .btn-primary:hover { transform: scale(1.02); }
        .btn-secondary { background: #e0e0e0; color: #333; }
        .video-container { margin: 1rem 0; border-radius: 20px; overflow: hidden; background: #000; position: relative; }
        video { width: 100%; transform: scaleX(-1); display: block; }
        .countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 5rem; font-weight: bold; color: white; text-shadow: 0 0 20px rgba(0,0,0,0.5); background: rgba(0,0,0,0.6); padding: 0.5rem 1rem; border-radius: 60px; }
        .progress-bar { width: 100%; height: 8px; background: #e0e0e0; border-radius: 10px; overflow: hidden; margin: 1rem 0; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #ff6b6b, #4ecdc4); transition: width 0.2s; }
        .status { color: #ff6b6b; margin: 1rem; font-weight: 500; }
        .results { background: linear-gradient(145deg, #fff5f8, #ffffff); padding: 1.5rem; border-radius: 24px; margin-top: 1rem; }
        .metric { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem; border-bottom: 1px solid #eee; }
        .metric:last-child { border-bottom: none; }
        .metric-label { font-weight: 600; color: #555; }
        .metric-value { font-weight: 800; font-size: 1.2rem; color: #ff6b6b; }
        .error { background: #ffe6e6; color: #d33; padding: 1rem; border-radius: 16px; margin-top: 1rem; border-right: 4px solid #d33; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid #f3f3f3; border-top: 3px solid #ff6b6b; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .beauty-score { font-size: 3rem; font-weight: bold; background: linear-gradient(45deg, #ff6b6b, #feca57); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        @media (max-width: 600px) { .container { padding: 1rem; } .card { padding: 1.5rem; margin-top: 2rem; } .countdown { font-size: 3rem; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">✨ BeautyVerse AI</div>
            <p style="color: #666; margin: 0.5rem 0 1.5rem;">تحليل وجه حقيقي بالذكاء الاصطناعي</p>
            
            <div id="setupArea">
                <button class="btn btn-primary" onclick="startRecording()">
                    <i class="fas fa-video"></i> سجل فيديو 10 ثوانٍ
                </button>
                <p style="font-size: 0.8rem; color: #888; margin-top: 1rem;">📸 سجل فيديو لمدة 10 ثوانٍ وسنقوم بتحليل وجهك</p>
            </div>
            
            <div id="videoArea" style="display: none;">
                <div class="video-container">
                    <video id="video" autoplay muted playsinline></video>
                    <div class="countdown" id="countdown">10</div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="status" id="status">📹 جاري التسجيل...</div>
            </div>
            
            <div id="resultsArea" style="display: none;"></div>
        </div>
    </div>

    <script>
        // ✅ المفاتيح الصحيحة (تم تحديثها)
        const FACE_API_KEY = 'WuWc4QDIsO86unJQt3PidDkRdJmmSyZC';
        const FACE_API_SECRET = 'fh2fh6aB45D0wIQHtH3Rch8VOahJKtDN';
        
        let stream, mediaRecorder, recordedChunks = [];
        let countdownInterval;
        
        async function startRecording() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } } 
                });
                
                const video = document.getElementById('video');
                video.srcObject = stream;
                await video.play();
                
                document.getElementById('setupArea').style.display = 'none';
                document.getElementById('videoArea').style.display = 'block';
                document.getElementById('resultsArea').style.display = 'none';
                
                startTimerAndRecord();
                
            } catch (err) {
                alert("❌ يرجى السماح بالوصول إلى الكاميرا");
                console.error(err);
            }
        }
        
        function startTimerAndRecord() {
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };
            mediaRecorder.onstop = () => processVideo();
            mediaRecorder.start();
            
            let timeLeft = 10;
            const countdownEl = document.getElementById('countdown');
            const progressFill = document.getElementById('progressFill');
            const statusEl = document.getElementById('status');
            
            countdownInterval = setInterval(() => {
                timeLeft--;
                countdownEl.innerText = timeLeft;
                progressFill.style.width = `${((10 - timeLeft) / 10) * 100}%`;
                statusEl.innerHTML = `📹 جاري التسجيل... ${timeLeft} ثوانٍ متبقية`;
                
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    statusEl.innerHTML = '✅ انتهى التسجيل، جاري المعالجة...';
                    mediaRecorder.stop();
                }
            }, 1000);
        }
        
        async function processVideo() {
            if (recordedChunks.length === 0) {
                showError("فشل في تسجيل الفيديو");
                return;
            }
            
            const videoBlob = new Blob(recordedChunks, { type: 'video/webm' });
            const videoUrl = URL.createObjectURL(videoBlob);
            const tempVideo = document.createElement('video');
            tempVideo.src = videoUrl;
            tempVideo.muted = true;
            
            await new Promise(resolve => {
                tempVideo.onloadedmetadata = () => {
                    tempVideo.play();
                    resolve();
                };
            });
            
            await new Promise(r => setTimeout(r, 200));
            tempVideo.currentTime = 5; // نأخذ صورة في منتصف الفيديو
            
            const frame = await new Promise(resolve => {
                tempVideo.onseeked = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = tempVideo.videoWidth;
                    canvas.height = tempVideo.videoHeight;
                    canvas.getContext('2d').drawImage(tempVideo, 0, 0);
                    canvas.toBlob(resolve, 'image/jpeg', 0.9);
                };
            });
            
            URL.revokeObjectURL(videoUrl);
            tempVideo.pause();
            
            if (stream) stream.getTracks().forEach(t => t.stop());
            
            await sendToAPI(frame);
        }
        
        async function sendToAPI(imageBlob) {
            const statusEl = document.getElementById('status');
            statusEl.innerHTML = '<span class="loading"></span> جاري الإرسال إلى Face++ API...';
            
            const formData = new FormData();
            formData.append('api_key', FACE_API_KEY);
            formData.append('api_secret', FACE_API_SECRET);
            formData.append('image_file', imageBlob);
            formData.append('return_attributes', 'gender,age,smiling,emotion,beauty');
            
            try {
                const response = await fetch('https://api-us.faceplusplus.com/facepp/v3/detect', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                console.log("Face++ Response:", data);
                
                if (data.error_message) {
                    showError(`خطأ من Face++: ${data.error_message}`);
                    return;
                }
                
                if (!data.faces || data.faces.length === 0) {
                    showError("❌ لم يتم اكتشاف وجه. تأكد من:\n• الإضاءة الجيدة\n• مواجهة الكاميرا\n• إزالة النظارات إذا كانت داكنة");
                    return;
                }
                
                const face = data.faces[0];
                const attrs = face.attributes;
                
                // حساب درجة الجمال
                let beauty = attrs.beauty.female_score;
                if (attrs.gender.value === 'Male') beauty = attrs.beauty.male_score;
                beauty = Math.round(beauty * 100);
                
                const gender = attrs.gender.value === 'Male' ? 'ذكر' : 'أنثى';
                const age = Math.round(attrs.age.value);
                const smile = Math.round(attrs.smile.value * 100);
                
                // تحديد المشاعر السائدة
                const emotionNames = { 
                    anger: '😠 غضب', disgust: '😖 اشمئزاز', fear: '😨 خوف', 
                    happiness: '😊 سعادة', neutral: '😐 محايد', sadness: '😢 حزن', surprise: '😲 مفاجأة' 
                };
                let topEmotion = '😐 محايد';
                let maxVal = 0;
                for (let [k, v] of Object.entries(attrs.emotion)) {
                    if (v > maxVal) { maxVal = v; topEmotion = emotionNames[k] || k; }
                }
                
                // نصائح مخصصة حسب النتيجة
                let advice = "";
                if (beauty >= 85) advice = "🌟 أنت رائع! ملامحك متوازنة وجذابة جداً!";
                else if (beauty >= 70) advice = "✨ جمالك مميز، ابتسامتك تزيد من جاذبيتك!";
                else if (beauty >= 55) advice = "💫 الجمال الحقيقي في ثقتك بنفسك، أنت فريد!";
                else advice = "🌸 الجمال ليس رقماً، ثقتك بنفسك هي سر جاذبيتك!";
                
                showResults({ beauty, gender, age, smile, emotion: topEmotion, advice });
                
            } catch (err) {
                console.error("Fetch error:", err);
                showError("❌ فشل الاتصال بخادم الذكاء الاصطناعي.\n\nتأكد من اتصال الإنترنت، أو حاول استخدام HTTPS (مثل Live Server في VS Code).");
            }
        }
        
        function showResults(r) {
            document.getElementById('videoArea').style.display = 'none';
            document.getElementById('resultsArea').style.display = 'block';
            document.getElementById('resultsArea').innerHTML = `
                <div class="results">
                    <h2 style="margin-bottom: 1rem;">✨ نتيجة التحليل</h2>
                    <div class="beauty-score">${r.beauty}%</div>
                    <p style="color: #888; margin-bottom: 1rem;">درجة الجمال</p>
                    <div class="metric">
                        <span class="metric-label">👤 الجنس</span>
                        <span class="metric-value">${r.gender}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">🎂 العمر التقريبي</span>
                        <span class="metric-value">${r.age} سنة</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">😊 درجة الابتسامة</span>
                        <span class="metric-value">${r.smile}%</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">😌 المشاعر السائدة</span>
                        <span class="metric-value">${r.emotion}</span>
                    </div>
                    <div style="background: #f0f0ff; padding: 1rem; border-radius: 16px; margin-top: 1rem;">
                        <p style="color: #ff6b6b; font-weight: bold;">💡 نصيحة مخصصة</p>
                        <p>${r.advice}</p>
                    </div>
                    <button class="btn btn-primary" onclick="resetApp()" style="margin-top: 1.5rem; width: 100%;">
                        <i class="fas fa-redo"></i> تحليل جديد
                    </button>
                </div>
            `;
        }
        
        function showError(msg) {
            document.getElementById('videoArea').style.display = 'none';
            document.getElementById('resultsArea').style.display = 'block';
            document.getElementById('resultsArea').innerHTML = `
                <div class="error">
                    <i class="fas fa-exclamation-triangle"></i> ${msg.replace(/\n/g, '<br>')}<br><br>
                    <button class="btn btn-secondary" onclick="resetApp()">محاولة مرة أخرى</button>
                </div>
            `;
            if (stream) stream.getTracks().forEach(t => t.stop());
        }
        
        function resetApp() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            if (countdownInterval) clearInterval(countdownInterval);
            document.getElementById('setupArea').style.display = 'block';
            document.getElementById('videoArea').style.display = 'none';
            document.getElementById('resultsArea').style.display = 'none';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('countdown').innerText = '10';
        }
    </script>
</body>
</html>
